<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Show Accounts - GoldDiggerBank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>

body{
background:#f8f6f0;
font-family:Arial;
}

/* Navbar */

.navbar{
background:#111 !important;
}

.navbar-brand{
color:#d4af37 !important;
font-weight:bold;
}

.nav-link{
color:white !important;
}

.nav-link:hover{
color:#d4af37 !important;
}

/* Header */

.admin-header{
background: linear-gradient(135deg,#000000,#b8962e);
color:white;
padding:60px;
border-radius:0 0 40px 40px;
text-align:center;
margin-bottom:40px;
}

.admin-header h1{
font-weight:bold;
}

/* Dashboard Card */

.dashboard-card{
background:white;
border-radius:12px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* Table */

.table thead{
background:#111;
color:#d4af37;
}

.table tbody tr:hover{
background:#fff8e1;
transition:0.3s;
}

/* Action Buttons */

.delete-btn{
color:#dc3545;
font-size:20px;
}

.delete-btn:hover{
color:#842029;
}

</style>

</head>

<body>

<!-- ADMIN NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container-fluid">

<a class="navbar-brand" th:href="@{/homeAdmin}">
<i class="fa-solid fa-building-columns"></i> GoldDiggerBank
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarSupportedContent">

<ul class="navbar-nav me-auto mb-2 mb-lg-0">

<li class="nav-item">
<a class="nav-link active" th:href="@{/adminAccounts}">
<i class="fa-solid fa-users"></i> Accounts
</a>
</li>

<li class="nav-item">
<a class="nav-link active" th:href="@{/adminCustomers}">
<i class="fa-solid fa-user-group"></i> Customers
</a>
</li>

<li class="nav-item">
<a class="nav-link active" th:href="@{/loanQueries}">
<i class="fa-solid fa-file-invoice-dollar"></i> Loan Requests
</a>
</li>

</ul>

<button onclick="window.location.href='/logout'" class="btn btn-warning">
Logout
</button>

</div>
</div>
</nav>


<!-- HEADER -->

<div class="admin-header">

<h1>
<i class="fa-solid fa-users"></i>
Manage Bank Accounts
</h1>

<p>View and manage all registered bank accounts</p>

</div>


<!-- ACCOUNT TABLE -->

<div class="container">

<div class="dashboard-card">

<h3 class="mb-4 text-center" style="color:#111;font-weight:bold;">
<i class="fa-solid fa-users"></i> All Bank Accounts
</h3>

<div class="table-responsive">

<table class="table table-bordered table-hover align-middle">

<thead>

<tr>
<th>Account No</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Address</th>
<th>Aadhar</th>
<th>Mobile</th>
<th>Balance</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="acc : ${acclist}">

<td th:text="${acc.acnum}"></td>
<td th:text="${acc.acholdername}"></td>
<td th:text="${acc.acholderage}"></td>
<td th:text="${acc.acholdergender}"></td>
<td th:text="${acc.acholderaddress}"></td>
<td th:text="${acc.acholderaadharnum}"></td>
<td th:text="${acc.acholdermobile}"></td>

<td>
₹ <span th:text="${acc.acbalance}"></span>
</td>

<td>

<a th:href="@{/deleteAccount/{id}(id=${acc.acnum})}" class="delete-btn">
<i class="fa-solid fa-trash"></i>
</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>


<!-- FOOTER -->

<footer class="bg-dark text-white text-center mt-5 p-3">
<p>© 2026 GoldDiggerBank Admin Panel</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
