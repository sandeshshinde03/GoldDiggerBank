<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ATM Form - GoldDiggerBank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

body{
background:linear-gradient(120deg,#eef2f3,#dfe9f3);
font-family:'Segoe UI',sans-serif;
}

/* Navbar */

.navbar{
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.navbar-brand{
font-weight:bold;
font-size:22px;
}

/* Header */

.header-section{
background:linear-gradient(135deg,#0d6efd,#6f42c1);
color:white;
text-align:center;
padding:60px;
border-radius:0 0 40px 40px;
margin-bottom:40px;
}

.header-section h1{
font-weight:bold;
}

/* ATM Form Card */

.service-card{
border:none;
border-radius:20px;
background:rgba(255,255,255,0.95);
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
padding:35px;
max-width:650px;
margin:auto;
}

.service-card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* Inputs */

.input-group-text{
background:#0d6efd;
color:white;
border:none;
}

.form-control{
padding:12px;
}

/* Button */

.btn-primary{
border-radius:25px;
padding:10px;
font-weight:600;
}

.btn-primary:hover{
background:#6610f2;
}

/* Footer */

footer{
margin-top:60px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-light bg-dark">
<div class="container-fluid">
<a style="color: white;" class="navbar-brand" th:href="@{home}">
<i class="fa-solid fa-building-columns"></i> GoldDiggerBank</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarSupportedContent">

<ul class="navbar-nav me-auto mb-2 mb-lg-0">

<li class="nav-item">
<a style="color: white;" class="nav-link active" th:href="@{aboutus}">About Us</a>
</li>

<li class="nav-item">
<a style="color: white;" class="nav-link active" th:href="@{contactus}">Contact Us</a>
</li>

<li class="nav-item">
<a style="color: white;" class="nav-link active" th:href="@{services}">Services</a>
</li>

</ul>

<button type="button" onclick="window.location.href='/logout'" class="btn btn-warning">LogOut</button>

</div>
</div>
</nav>


<!-- Header -->

<div class="header-section">

<h1><i class="fa-solid fa-credit-card"></i> Apply For ATM Card</h1>

<p>Request your GoldDiggerBank ATM card securely</p>

</div>


<!-- ATM Form -->

<div class="container">

<div class="service-card">

<form th:action="@{/addATM}" method="post">

<!-- Bank Name -->

<div class="mb-4">

<label class="form-label">Bank Name</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-building-columns"></i>
</span>

<input type="text" name="bankname" value="GoldDiggerBank" class="form-control" readonly>

</div>

</div>


<!-- Account Number -->

<div class="mb-3">

<label class="form-label">Account Number</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-hashtag"></i>
</span>

<input type="number" name="acno" placeholder="Enter your Account number" class="form-control" required>

</div>

</div>


<!-- Name -->

<div class="mb-3">

<label class="form-label">Account Holder Name</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-user"></i>
</span>

<input type="text" name="name" placeholder="Enter your name" class="form-control" required>

</div>

</div>


<!-- PIN -->

<div class="mb-3">

<label class="form-label">ATM PIN</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>

<input type="number" name="pin" placeholder="Enter 4 digit PIN" class="form-control" required>

</div>

</div>


<!-- Valid From -->

<div class="mb-3">

<label class="form-label">Valid From</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-calendar"></i>
</span>

<input type="date" name="validFrom" class="form-control" required>

</div>

</div>


<div class="d-grid">

<button type="submit" class="btn btn-primary">

<i class="fa-solid fa-paper-plane"></i> Apply ATM Card

</button>

</div>

</form>

</div>

</div>


<!-- Footer -->

<footer class="bg-dark text-white text-center p-3">

<p>© 2026 GoldDiggerBank | Secure Digital Banking</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>S
