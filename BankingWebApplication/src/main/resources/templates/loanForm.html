<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Apply Loan - GoldDiggerBank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

body{
background:linear-gradient(120deg,#eef2f3,#dfe9f3);
font-family:'Segoe UI',sans-serif;
}

/* Navbar */

.navbar{
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.navbar-brand{
font-weight:bold;
font-size:22px;
}

/* Header */

.header-section{
background:linear-gradient(135deg,#0d6efd,#6f42c1);
color:white;
text-align:center;
padding:60px;
border-radius:0 0 40px 40px;
margin-bottom:40px;
}

.header-section h1{
font-weight:bold;
}

/* Form Card */

.service-card{
border:none;
border-radius:20px;
background:rgba(255,255,255,0.95);
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
padding:40px;
max-width:900px;
margin:auto;
}

.service-card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* Section Titles */

.section-title{
margin-top:20px;
margin-bottom:15px;
font-weight:bold;
color:#0d6efd;
border-bottom:2px solid #eee;
padding-bottom:5px;
}

/* Inputs */

.form-control,
.form-select{
padding:12px;
}

/* Button */

.btn-custom{
border-radius:25px;
padding:12px;
font-weight:600;
}

/* Footer */

footer{
margin-top:60px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-light bg-dark">
<div class="container-fluid">

<a style="color: white;" class="navbar-brand" th:href="@{home}">
<i class="fa-solid fa-building-columns"></i> GoldDiggerBank
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarSupportedContent">

<ul class="navbar-nav me-auto mb-2 mb-lg-0">

<li class="nav-item">
<a style="color: white;" class="nav-link active" th:href="@{aboutus}">About Us</a>
</li>

<li class="nav-item">
<a style="color: white;" class="nav-link active" th:href="@{contactus}">Contact Us</a>
</li>

<li class="nav-item">
<a style="color: white;" class="nav-link active" th:href="@{services}">Services</a>
</li>

</ul>

<button type="button" onclick="window.location.href='/logout'" class="btn btn-warning">
LogOut
</button>

</div>
</div>
</nav>


<!-- Header -->

<div class="header-section">

<h1><i class="fa-solid fa-hand-holding-dollar"></i> Loan Application</h1>

<p>Apply for a loan securely with GoldDiggerBank</p>

</div>


<!-- Loan Form -->

<div class="container">

<div class="service-card">

<form th:action="@{/applyForLoan}" method="post">


<h5 class="section-title">
<i class="fa-solid fa-user"></i> Applicant Information
</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" name="applicantname" required>
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Age</label>
<input type="number" class="form-control" name="applicantage" required>
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Gender</label>
<select name="applicantgender" class="form-select" required>
<option selected disabled>Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

</div>


<div class="mb-3">
<label class="form-label">Address</label>
<input type="text" class="form-control" name="applicantaddress" required>
</div>


<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Aadhar Number</label>
<input type="number" class="form-control" name="applicantaadharnum" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Mobile Number</label>
<input type="number" class="form-control" name="applicantmobile" required>
</div>

</div>


<h5 class="section-title">
<i class="fa-solid fa-user-shield"></i> Guarantor Information
</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Guarantor Name</label>
<input type="text" class="form-control" name="gname" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Guarantor Aadhar</label>
<input type="number" class="form-control" name="gadharnum" required>
</div>

</div>

<div class="mb-3">

<label class="form-label">Relation With Guarantor</label>

<select name="grelation" class="form-select" required>
<option selected disabled>Select Relation</option>
<option>Father</option>
<option>Mother</option>
<option>Wife</option>
<option>Husband</option>
<option>Brother</option>
<option>Sister</option>
</select>

</div>


<h5 class="section-title">
<i class="fa-solid fa-coins"></i> Loan Details
</h5>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Loan Type</label>

<select name="loanType" class="form-select" required>
<option selected disabled>Select Loan Type</option>
<option>Personal</option>
<option>Home</option>
<option>Business</option>
<option>Education</option>
<option>Gold</option>
</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Expected Loan Amount</label>

<input type="number" class="form-control" name="examt" placeholder="Enter Amount" required>

</div>

</div>


<div class="mb-3">

<label class="form-label">Loan Status</label>

<input type="text" class="form-control" th:value="'pending'" name="status" readonly>

</div>


<div class="d-grid mt-4">

<button type="submit" class="btn btn-primary btn-custom">

<i class="fa-solid fa-paper-plane"></i> Submit Loan Application

</button>

</div>

</form>

</div>

</div>


<!-- Footer -->

<footer class="bg-dark text-white text-center p-3">

<p>© 2026 GoldDiggerBank | Secure Digital Banking</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
