<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ATM Details - GoldDiggerBank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

body{
background:linear-gradient(120deg,#eef2f3,#dfe9f3);
font-family:'Segoe UI',sans-serif;
}

/* Navbar */

.navbar{
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.navbar-brand{
font-weight:bold;
font-size:22px;
}

/* Header */

.header-section{
background:linear-gradient(135deg,#0d6efd,#6f42c1);
color:white;
text-align:center;
padding:55px;
border-radius:0 0 40px 40px;
margin-bottom:40px;
}

/* Card */

.details-card{
max-width:650px;
margin:auto;
border:none;
border-radius:18px;
background:white;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
padding:35px;
transition:0.3s;
}

.details-card:hover{
transform:translateY(-5px);
}

/* Table */

.table th{
width:40%;
background:#f8f9fa;
}

/* ATM Icon */

.atm-icon{
font-size:45px;
color:#0d6efd;
margin-bottom:15px;
text-align:center;
}

footer{
margin-top:60px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand" th:href="@{home}">
<i class="fa-solid fa-building-columns"></i> GoldDiggerBank
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarSupportedContent">

<ul class="navbar-nav me-auto mb-2 mb-lg-0">

<li class="nav-item">
<a class="nav-link active" th:href="@{aboutus}">About Us</a>
</li>

<li class="nav-item">
<a class="nav-link active" th:href="@{contactus}">Contact Us</a>
</li>

<li class="nav-item">
<a class="nav-link active" th:href="@{services}">Services</a>
</li>

</ul>

<button onclick="window.location.href='/logout'" class="btn btn-warning">
Logout
</button>

</div>

</div>

</nav>

<!-- Header -->

<div class="header-section">

<h1>
<i class="fa-solid fa-credit-card"></i> ATM Card Details
</h1>

<p>Your ATM card verification was successful</p>

</div>

<!-- ATM Details -->

<div class="container">

<div class="details-card">

<div class="atm-icon">
<i class="fa-solid fa-credit-card"></i>
</div>

<h4 class="text-center mb-4">ATM Information</h4>

<table class="table table-bordered table-striped">

<tr>
<th>Card Number</th>
<td th:text="${atm.cardno}"></td>
</tr>

<tr>
<th>Card Holder Name</th>
<td th:text="${atm.name}"></td>
</tr>

<tr>
<th>Account Number</th>
<td th:text="${atm.acno}"></td>
</tr>

<tr>
<th>PIN</th>
<td th:text="${atm.pin}"></td>
</tr>

<tr>
<th>Valid From</th>
<td th:text="${atm.validFrom}"></td>
</tr>

<tr>
<th>Expiry Date</th>
<td th:text="${atm.expUpTo}"></td>
</tr>

<tr>
<th>Bank Name</th>
<td th:text="${atm.bankname}"></td>
</tr>

</table>

<div class="text-center mt-4">

<a th:href="@{/services}" class="btn btn-primary">

<i class="fa-solid fa-arrow-left"></i> Back to Services

</a>

</div>

</div>

</div>

<!-- Footer -->

<footer class="bg-dark text-white text-center p-3">

<p>© 2026 GoldDiggerBank | Secure Digital Banking</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
