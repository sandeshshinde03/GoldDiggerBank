<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SignUp - GoldDiggerBank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>

/* Page Background */

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;

padding-top:60px;
padding-bottom:60px;

font-family:'Segoe UI',sans-serif;

background:
linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.75)),
url("https://images.unsplash.com/photo-1559526324-4b87b5e36e44") center/cover no-repeat;
}

/* Card */

.login-card{
width:420px;
padding:40px;
border-radius:15px;
background:white;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
border:1px solid #eee;
}

/* Bank icon */

.bank-icon{
text-align:center;
font-size:48px;
color:#2563eb;
margin-bottom:10px;
}

/* Title */

.title{
text-align:center;
color:#2563eb;
font-weight:700;
margin-bottom:25px;
}

/* Labels */

.form-label{
color:#444;
font-weight:500;
}

/* Inputs */

.form-control{
background:#f8fafc;
border:1px solid #ddd;
color:#333;
}

.form-control:focus{
border-color:#2563eb;
box-shadow:0 0 0 2px rgba(37,99,235,0.1);
background:white;
}

/* Icons */

.input-group-text{
background:#2563eb;
color:white;
border:none;
}

/* Button */

.btn-login{
background:#2563eb;
color:white;
font-weight:600;
border-radius:8px;
padding:10px;
transition:0.3s;
}

.btn-login:hover{
background:#1d4ed8;
}

/* Link */

.create-link a{
color:#2563eb;
text-decoration:none;
font-weight:600;
}

.create-link a:hover{
text-decoration:underline;
}

/* Footer */

.footer{
text-align:center;
margin-top:20px;
color:#777;
font-size:13px;
}

</style>

</head>

<body>

<div class="login-card">

<div class="bank-icon">
<i class="fa-solid fa-building-columns"></i>
</div>

<h3 class="title">Create GoldDiggerBank Account</h3>

<form th:action="@{/addUser}" method="post">

<div class="mb-3">
<label class="form-label">User Name</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa-solid fa-user"></i>
</span>

<input type="text"
name="cname"
class="form-control"
placeholder="Enter Name"
required>
</div>
</div>


<div class="mb-3">
<label class="form-label">User Role</label>

<select name="role" class="form-select" required>
<option selected disabled>Select Role</option>
<option>ADMIN</option>
<option>USER</option>
</select>
</div>


<div class="mb-3">
<label class="form-label">Gender</label>

<select name="cgender" class="form-select" required>
<option selected disabled>Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>


<div class="mb-3">
<label class="form-label">Email</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa-solid fa-envelope"></i>
</span>

<input type="email"
name="cemail"
class="form-control"
placeholder="abc@gmail.com"
required>
</div>
</div>


<div class="mb-3">
<label class="form-label">Password</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>

<input type="password"
id="password"
name="cpass"
class="form-control"
placeholder="********"
required>

<button class="input-group-text" type="button" onclick="togglePassword()">
<i id="eyeIcon" class="fa-solid fa-eye"></i>
</button>
</div>
</div>


<div class="d-grid mb-3">
<button type="submit" class="btn btn-login">
<i class="fa-solid fa-user-plus"></i> Create Account
</button>
</div>


<div class="text-center create-link">
Already have an account?
<a th:href="@{/gotologin}">Login</a>
</div>

</form>

<div class="footer">
© 2026 GoldDiggerBank Secure Banking
</div>

</div>

<script>

function togglePassword(){

let pass=document.getElementById("password");
let icon=document.getElementById("eyeIcon");

if(pass.type==="password"){
pass.type="text";
icon.classList.replace("fa-eye","fa-eye-slash");
}else{
pass.type="password";
icon.classList.replace("fa-eye-slash","fa-eye");
}

}

</script>

</body>
</html>
