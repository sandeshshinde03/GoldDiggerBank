<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Verify ATM - GoldDiggerBank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

body{
background:linear-gradient(120deg,#eef2f3,#dfe9f3);
font-family:'Segoe UI',sans-serif;
}

/* Navbar */

.navbar{
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.navbar-brand{
font-weight:bold;
font-size:22px;
}

/* Header */

.header-section{
background:linear-gradient(135deg,#0d6efd,#6f42c1);
color:white;
text-align:center;
padding:55px;
border-radius:0 0 40px 40px;
margin-bottom:40px;
}

/* Card */

.service-card{
max-width:520px;
margin:auto;
border:none;
border-radius:18px;
background:white;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
padding:35px;
transition:0.3s;
}

.service-card:hover{
transform:translateY(-5px);
}

/* Inputs */

.input-group-text{
background:#0d6efd;
color:white;
border:none;
}

.form-control{
padding:12px;
}

/* Button */

.btn-custom{
border-radius:25px;
padding:10px 20px;
font-weight:600;
}

/* Error Message */

.error-box{
background:#ffe5e5;
color:#b30000;
padding:10px;
border-radius:8px;
text-align:center;
margin-bottom:15px;
}

/* ATM Icon */

.atm-icon{
font-size:40px;
color:#0d6efd;
margin-bottom:15px;
}

footer{
margin-top:60px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand" th:href="@{home}">
<i class="fa-solid fa-building-columns"></i> GoldDiggerBank
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarSupportedContent">

<ul class="navbar-nav me-auto mb-2 mb-lg-0">

<li class="nav-item">
<a class="nav-link active" th:href="@{aboutus}">About Us</a>
</li>

<li class="nav-item">
<a class="nav-link active" th:href="@{contactus}">Contact Us</a>
</li>

<li class="nav-item">
<a class="nav-link active" th:href="@{services}">Services</a>
</li>

</ul>

<button onclick="window.location.href='/logout'" class="btn btn-warning">
Logout
</button>

</div>

</div>

</nav>

<!-- Header -->

<div class="header-section">

<h1>
<i class="fa-solid fa-shield-halved"></i> ATM Verification
</h1>

<p>Verify your GoldDiggerBank ATM card to continue banking securely</p>

</div>

<!-- Form -->

<div class="container">

<div class="service-card text-center">

<div class="atm-icon">
<i class="fa-solid fa-credit-card"></i>
</div>

<h4 class="mb-4">Enter ATM Details</h4>

<!-- Error Message -->

<div th:if="${error}" class="error-box">
<span th:text="${error}"></span>
</div>

<form th:action="@{/verifyATMData}" method="get">

<div class="mb-3 text-start">

<label class="form-label">Card Number</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-credit-card"></i>
</span>

<input type="number"
name="cardno"
class="form-control"
placeholder="Enter your ATM card number"
required>

</div>

</div>

<div class="mb-3 text-start">

<label class="form-label">PIN</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>

<input type="password"
name="pin"
class="form-control"
placeholder="Enter 4-digit PIN"
maxlength="4"
required>

</div>

</div>

<div class="d-grid mt-3">

<button type="submit" class="btn btn-primary btn-custom">

<i class="fa-solid fa-circle-check"></i> Verify ATM

</button>

</div>

</form>

</div>

</div>

<!-- Footer -->

<footer class="bg-dark text-white text-center p-3">

<p>© 2026 GoldDiggerBank | Secure Digital Banking</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
