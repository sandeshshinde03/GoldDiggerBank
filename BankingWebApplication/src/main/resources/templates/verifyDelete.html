<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Verify Account For Delete - GoldDiggerBank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>

body{
background:#f5f7fa;
font-family:Arial;
}

/* Header */

.page-header{
background: linear-gradient(135deg,#0d6efd,#6f42c1);
color:white;
padding:60px;
text-align:center;
margin-bottom:40px;
border-radius:0 0 40px 40px;
}

.page-header h2{
font-weight:600;
margin-bottom:10px;
}

.page-header p{
opacity:0.9;
}

/* Form Card */

.verify-card{
max-width:520px;
margin:auto;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
background:white;
transition:0.3s;
}

.verify-card:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

/* Input Group */

.input-group-text{
background:#0d6efd;
color:white;
border:none;
}

.form-control{
border-radius:0 8px 8px 0;
padding:12px;
}

/* Button */

.btn-primary{
padding:10px;
font-weight:600;
border-radius:8px;
transition:0.2s;
}

.btn-primary:hover{
background:#6610f2;
}

</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-dark">
<div class="container-fluid">
<a style="color: white;" class="navbar-brand" th:href="@{home}">
<i class="fa-solid fa-building-columns"></i> GoldDiggerBank</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarSupportedContent">

<ul class="navbar-nav me-auto mb-2 mb-lg-0">

<li class="nav-item">
<a style="color: white;" class="nav-link active" th:href="@{aboutus}">About Us</a>
</li>

<li class="nav-item">
<a style="color: white;" class="nav-link active" th:href="@{contactus}">Contact Us</a>
</li>

<li class="nav-item">
<a style="color: white;" class="nav-link active" th:href="@{services}">Services</a>
</li>

</ul>

<button type="button" onclick="window.location.href='/logout'" class="btn btn-warning">LogOut</button>

</div>
</div>
</nav>


<!-- Header -->

<div class="page-header">

<h2><i class="fa-solid fa-shield-halved"></i> Account Verification</h2>
<p>Verify your GoldDiggerBank account to continue</p>

</div>


<!-- Verification Form -->

<div class="container">

<div class="verify-card">

<h4 class="text-center mb-4">Enter Account Number</h4>

<form th:action="@{/verifyRemove}">

<div class="mb-3">

<label class="form-label">Account Number</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-hashtag"></i>
</span>

<input type="number"
       name="acnum"
       class="form-control"
       placeholder="Enter your account number"
       required>

</div>

</div>

<div class="d-grid">

<button type="submit" class="btn btn-primary">

<i class="fa-solid fa-circle-check"></i> Verify Account

</button>

</div>

</form>

</div>

</div>


<!-- Footer -->

<footer class="bg-dark text-white text-center mt-5 p-3">

<p>© 2026 GoldDiggerBank. All Rights Reserved.</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
